name: Build and Push to Docker Hub

env:
  VITE_API_BASE_URL: /api
  VITE_KEYCLOAK_URL: http://raspberrypi.local:8081
  VITE_KEYCLOAK_REALM: receipts
  VITE_KEYCLOAK_CLIENT_ID: receipts-web

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/receipts-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/receipts-backend:${{ github.sha }}
          build-args: |
            SPRING_PROFILES_ACTIVE: dev
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/receipts?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
            SPRING_DATASOURCE_USERNAME: receipts
            SPRING_DATASOURCE_PASSWORD: receipts
            SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/receipts
            APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
            LOGGING_LEVEL_ROOT: DEBUG
            LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
            LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY_OAUTH2: DEBUG
            LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG

            
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/receipts-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/receipts-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_KEYCLOAK_URL=${{ env.VITE_KEYCLOAK_URL }}
            VITE_KEYCLOAK_REALM=${{ env.VITE_KEYCLOAK_REALM }}
            VITE_KEYCLOAK_CLIENT_ID=${{ env.VITE_KEYCLOAK_CLIENT_ID }}
