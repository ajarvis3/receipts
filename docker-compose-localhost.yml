services:
   mysql:
      image: mysql:8.4
      container_name: receipts-mysql
      environment:
         MYSQL_ROOT_PASSWORD: rootpassword
         MYSQL_DATABASE: receipts
         MYSQL_USER: receipts
         MYSQL_PASSWORD: receipts
      ports:
         - "3306:3306"
      volumes:
         - mysql_data:/var/lib/mysql
         - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      healthcheck:
         test:
           [
              "CMD",
              "mysqladmin",
              "ping",
              "-h",
              "127.0.0.1",
              "-ureceipts",
              "-preceipts",
           ]
         interval: 10s
         timeout: 5s
         retries: 10

   keycloak:
      image: quay.io/keycloak/keycloak:26.6.1
      container_name: receipts-keycloak
      command:
         - start-dev
         - --import-realm
      environment:
         KC_BOOTSTRAP_ADMIN_USERNAME: admin
         KC_BOOTSTRAP_ADMIN_PASSWORD: admin
         KC_DB: mysql
         KC_DB_URL: jdbc:mysql://mysql:3306/keycloak?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
         KC_DB_USERNAME: keycloak
         KC_DB_PASSWORD: keycloak
         KC_HTTP_ENABLED: "true"
         KC_PROXY_HEADERS: xforwarded
      depends_on:
         mysql:
            condition: service_healthy
      ports:
         - "8081:8080"
      volumes:
         - keycloak_data:/opt/keycloak/data
         - ./docker/keycloak-localhost:/opt/keycloak/data/import:ro

   backend:
      build:
         context: ./backend
      container_name: receipts-backend
      environment:
         SPRING_PROFILES_ACTIVE: dev
         SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/receipts?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
         SPRING_DATASOURCE_USERNAME: receipts
         SPRING_DATASOURCE_PASSWORD: receipts
         SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/receipts
         APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
         LOGGING_LEVEL_ROOT: DEBUG
         LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
         LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY_OAUTH2: DEBUG
         LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
      depends_on:
         mysql:
            condition: service_healthy
      ports:
         - "8080:8080"
      volumes:
         - receipts_data:/app/receipts

   frontend:
      build:
         context: ./frontend
         args:
            VITE_API_BASE_URL: /api
            VITE_KEYCLOAK_URL: http://localhost:8081
            VITE_KEYCLOAK_REALM: receipts
            VITE_KEYCLOAK_CLIENT_ID: receipts-web
      container_name: receipts-frontend
      depends_on:
         - backend
         - keycloak
      ports:
         - "3000:80"

volumes:
   mysql_data:
   keycloak_data:
   receipts_data:
