spring:
   application:
      name: receipts-backend
   datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://mariadb:3306/receipts?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
      username: ${SPRING_DATASOURCE_USERNAME:receipts}
      password: ${SPRING_DATASOURCE_PASSWORD:receipts}
   jpa:
      hibernate:
         ddl-auto: validate # Hibernate issues
      open-in-view: false
      properties:
         hibernate:
            jdbc:
               time_zone: UTC
   flyway:
      enabled: true
      url: ${SPRING_DATASOURCE_URL}
      user: ${SPRING_DATASOURCE_USERNAME}
      password: ${SPRING_DATASOURCE_PASSWORD}
   security:
      oauth2:
         resourceserver:
            jwt:
               issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/receipts}

server:
   port: 8080

app:
   cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
   storage:
      receipts-dir: /app/receipts

management:
   endpoints:
      web:
         exposure:
            include: health,info

logging:
   level:
      org.springframework.boot.autoconfigure.flyway: DEBUG
      org.flywaydb: DEBUG
